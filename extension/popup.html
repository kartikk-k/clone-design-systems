<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      background: rgb(29, 29, 31);
      color: rgba(255, 255, 255, 0.9);
      padding: 14px;
      padding-bottom: 10px;
      -webkit-font-smoothing: antialiased;
      border: 1px solid rgba(255, 255, 255,0.2 );
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .header-logo {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      object-fit: cover;
    }
    .header h1 {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: rgba(255, 255, 255, 0.9);
    }

    /* Status */
    .status {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      flex-shrink: 0;
    }
    .dot.connected { background: rgb(81, 141, 210); }

    /* Button */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 32px;
      padding: 0 16px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
      -webkit-font-smoothing: antialiased;
    }
    .btn:hover { opacity: 0.85; }
    .btn:active { opacity: 0.7; }
    .btn:disabled { opacity: 0.35; cursor: default; }
    .btn-primary {
      background: #0171e3;
      color: #fff;
    }

    /* Hint text */
    .hint {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.3);
      margin-top: 8px;
      line-height: 1.4;
    }

    /* Result */
    .result {
      font-size: 11px;
      margin-top: 10px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.04);
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      display: none;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.7);
    }
    .result.show { display: block; }
    .result.success { border-left: 3px solid rgb(81, 141, 210); }
    .result.error { border-left: 3px solid rgb(232, 118, 94); }
    .result strong { color: rgba(255, 255, 255, 0.9); }

    /* Settings */
    .settings {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 0.5px solid rgba(255, 255, 255, 0.08);
    }
    .settings label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.3);
      display: block;
      margin-bottom: 4px;
      letter-spacing: 0.02em;
    }
    .settings input {
      width: 100%;
      height: 28px;
      padding: 0 8px;
      background: rgba(255, 255, 255, 0.04);
      border: 0.5px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 11px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      outline: none;
      transition: border-color 0.15s;
    }
    .settings input:focus {
      border-color: rgba(255, 255, 255, 0.2);
    }

    /* Footer */
    .footer {
      margin-top: 14px;
      padding-top: 10px;
      border-top: 0.5px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .footer a {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.25);
      text-decoration: none;
      padding: 2px 0;
      transition: color 0.15s;
    }
    .footer a:hover { color: rgba(255, 255, 255, 0.5); }
    .footer-sep {
      font-size: 9px;
      color: rgba(255, 255, 255, 0.1);
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon48.png" class="header-logo" alt="" />
    <h1>Design Grab</h1>
  </div>

  <div class="status" id="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Checking server...</span>
  </div>

  <button class="btn btn-primary" id="capturePage" disabled>
    Capture This Page
  </button>

  <button class="btn" id="captureSection" disabled style="display:none">
    Select Section
  </button>

  <div class="hint">
    Captures the entire page with all CSS inlined and sends to your local server.
  </div>

  <div class="result" id="result"></div>

  <div class="settings">
    <label>Server URL</label>
    <input type="text" id="serverUrl" value="http://localhost:3847" />
  </div>

  <div class="footer">
    <a href="https://designgrab.vercel.app" target="_blank" rel="noopener noreferrer">Website</a>
    <span class="footer-sep">&middot;</span>
    <a href="https://designgrab.vercel.app/docs" target="_blank" rel="noopener noreferrer">Docs</a>
    <span class="footer-sep">&middot;</span>
    <a href="https://github.com/kartikk-k/designgrab" target="_blank" rel="noopener noreferrer">GitHub</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
