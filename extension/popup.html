<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      background: #000000;
      color: #e5e5e5;
      padding: 12px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #333;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 400;
    }
    .header .logo {
      font-size: 10px;
      font-weight: 700;
      color: #666;
      letter-spacing: 1px;
      background: #2a2a2a;
      padding: 3px 6px;
      border-radius: 4px;
    }
    .status {
      font-size: 11px;
      color: #888;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ef4444;
    }
    .status .dot.connected {
      background: #22c55e;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 8px;
      font-family: inherit;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:active { opacity: 0.7; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-primary {
      background: #ffffff;
      color: #000000;
    }
    .btn-secondary {
      background: #2a2a2a;
      color: #e5e5e5;
      border: 1px solid #333;
    }
    .result {
      font-size: 11px;
      margin-top: 12px;
      padding: 10px;
      background: #222;
      border-radius: 6px;
      display: none;
    }
    .result.show { display: block; }
    .result.success { border-left: 3px solid #22c55e; }
    .result.error { border-left: 3px solid #ef4444; }
    .settings {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #333;
    }
    .settings label {
      font-size: 11px;
      color: #888;
      display: block;
      margin-bottom: 4px;
    }
    .settings input {
      width: 100%;
      padding: 6px 8px;
      background: #222;
      border: 1px solid #333;
      border-radius: 4px;
      color: #e5e5e5;
      font-size: 12px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Design Grab</h1>
  </div>

  <div class="status" id="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Checking server...</span>
  </div>

  <button class="btn btn-primary" id="capturePage" disabled>
    Capture This Page
  </button>

  <button class="btn btn-secondary" id="captureSection" disabled style="display:none">
    Select Section
  </button>

  <div style="font-size: 10px; color: #666; margin-top: 4px;">
    Captures the entire page and sends to local server.
  </div>

  <div class="result" id="result"></div>

  <div class="settings">
    <label>Server URL</label>
    <input type="text" id="serverUrl" value="http://localhost:3847" />
  </div>

  <script src="popup.js"></script>
</body>
</html>
