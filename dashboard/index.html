<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design Grab — Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    @theme {
      --font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Inter", "Helvetica Neue", sans-serif;
    }
  </style>
  <style>
    .page-card-preview iframe {
      width: 1440px;
      height: 900px;
      border: none;
      transform-origin: top left;
      transform: scale(0.124);
      pointer-events: none;
    }
    .design-md-content::-webkit-scrollbar,
    .sidebar-scroll::-webkit-scrollbar {
      width: 5px;
    }
    .design-md-content::-webkit-scrollbar-track,
    .sidebar-scroll::-webkit-scrollbar-track {
      background: transparent;
    }
    .design-md-content::-webkit-scrollbar-thumb,
    .sidebar-scroll::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 3px;
    }
    .md-rendered {
      font-family: var(--font-sans, ui-sans-serif, system-ui, sans-serif);
      font-size: 11px;
      line-height: 1.55;
      color: rgba(255, 255, 255, 0.55);
    }
    .md-rendered h1 {
      font-size: 15px;
      font-weight: 500;
      color: #fff;
      margin-bottom: 6px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }
    .md-rendered h2 {
      font-size: 12px;
      font-weight: 500;
      color: #fff;
      margin-top: 16px;
      margin-bottom: 6px;
    }
    .md-rendered h3 {
      font-size: 11px;
      font-weight: 500;
      color: #fff;
      margin-top: 12px;
      margin-bottom: 4px;
    }
    .md-rendered p { margin-bottom: 6px; }
    .md-rendered blockquote {
      border-left: 2px solid rgba(255, 255, 255, 0.15);
      padding-left: 10px;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 8px;
      font-size: 10px;
    }
    .md-rendered code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 10px;
      background: rgba(255, 255, 255, 0.08);
      padding: 1px 4px;
      border-radius: 3px;
      color: rgba(255, 255, 255, 0.9);
    }
    .md-rendered pre {
      background: rgb(12, 12, 12);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      padding: 10px 12px;
      overflow-x: auto;
      margin-bottom: 8px;
    }
    .md-rendered pre code {
      background: none;
      padding: 0;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.55);
    }
    .md-rendered table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 8px;
      font-size: 10px;
    }
    .md-rendered th {
      text-align: left;
      padding: 4px 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.4);
      font-weight: 600;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .md-rendered td {
      padding: 4px 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.55);
    }
    .md-rendered ul, .md-rendered ol {
      padding-left: 16px;
      margin-bottom: 6px;
    }
    .md-rendered li { margin-bottom: 2px; }
    .md-rendered strong { color: #fff; }
    .md-rendered hr {
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      margin: 12px 0;
    }
  </style>
</head>
<body class="min-h-full bg-black text-[12px] font-medium leading-snug tracking-[-0.1px] text-white antialiased">
  <div class="flex min-h-screen">
    <!-- Narrow rail: brand + scrollable sites + status -->
    <aside
      id="sidebar"
      class="flex min-h-screen w-[11.25rem] shrink-0 flex-col border-r border-white/15 bg-black py-3 pl-2 pr-1.5"
    >
      <div class="flex shrink-0 items-start gap-2 px-1.5 pb-1">

        </svg>
        <div class="min-w-0 leading-tight">
          <div class="text-[11px] font-medium tracking-[-0.08px] text-white/90">Design Grab</div>
          <div class="text-[10px] font-medium text-white/35">Dashboard</div>
        </div>
      </div>

      <div class="mx-1.5 mb-1.5 mt-2 flex min-h-0 flex-1 flex-col border-t border-white/10 pt-2">
        <div class="shrink-0 px-1.5 pb-1 text-[10px] font-semibold uppercase tracking-[0.1em] text-white/35">Sites</div>
        <div id="siteList" class="sidebar-scroll flex min-h-0 flex-1 flex-col gap-px overflow-y-auto pr-0.5"></div>
      </div>

      <div class="mt-auto border-t border-white/10 px-2 pt-2.5">
        <div class="flex items-center gap-1.5 text-[10px] font-medium tabular-nums text-white/40">
          <span class="h-1 w-1 shrink-0 rounded-full bg-emerald-400/90" id="serverDot"></span>
          <span id="serverStatus" class="truncate" title="Dashboard server">On :3847</span>
        </div>
      </div>
    </aside>

    <main class="flex min-w-0 flex-1 flex-col bg-black" id="main">
      <div id="welcomeView" class="flex flex-1 flex-col items-center justify-center px-6 py-10">
        <div class="max-w-[17rem] text-center">
          <p class="mb-2 text-[11px] font-medium text-white/45">Local captures</p>
          <h1 class="mb-2 text-[15px] font-medium tracking-[-0.2px] text-white">Design Grab</h1>
          <p class="mb-3 text-[11px] leading-relaxed text-white/45">
            Use the extension to capture a site, then pick it in the sidebar. Manage pages and
            <code class="rounded border border-white/15 bg-white/[0.06] px-1 py-px font-mono text-[10px] text-white/65">design.md</code> here.
          </p>
          <p class="text-[10px] text-white/30">Select a site from the list</p>
        </div>
      </div>

      <div id="siteView" class="hidden flex min-h-0 flex-1 flex-col">
        <div class="flex h-9 shrink-0 items-center gap-1.5 border-b border-white/15 px-4 text-xs" id="topbar">
          <span class="truncate font-medium text-white/90" id="topbarTitle"></span>
          <span class="shrink-0 text-white/25">/</span>
          <span class="shrink-0 text-white/40" id="topbarPage">Overview</span>
          <div class="ml-auto flex items-center gap-1.5" id="topbarActions"></div>
        </div>
        <div class="min-h-0 flex-1 overflow-y-auto px-4 py-4 md:px-5" id="siteContent"></div>
      </div>
    </main>
  </div>

  <div id="toast" role="status" aria-live="polite"></div>
  <script src="./app.js"></script>
</body>
</html>
