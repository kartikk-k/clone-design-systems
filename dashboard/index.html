<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design System Clone</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page: rgb(20, 20, 20);
      --bg-card: rgb(24, 24, 24);
      --bg-surface: rgb(51, 51, 51);
      --text-primary: rgba(229, 229, 229, 0.94);
      --text-secondary: rgba(229, 229, 229, 0.7);
      --text-muted: rgba(229, 229, 229, 0.48);
      --text-faint: rgba(229, 229, 229, 0.32);
      --border-default: rgba(229, 229, 229, 0.08);
      --border-subtle: rgba(229, 229, 229, 0.12);
      --brand-accent: rgb(63, 162, 102);
      --brand-accent-soft: rgba(63, 162, 102, 0.12);
      --bg-primary-button: rgb(228, 228, 228);
      --text-on-primary: rgb(25, 28, 34);
      --red-error: rgb(220, 38, 38);
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      font-size: 13px;
      line-height: 18px;
      min-height: 100vh;
    }

    /* ─── Layout ─────────────────────────── */

    .shell {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 240px;
      min-width: 240px;
      border-right: 0.5px solid var(--border-default);
      display: flex;
      flex-direction: column;
      padding: 16px 8px;
      gap: 4px;
      overflow-y: auto;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .sidebar-header {
      padding: 0 8px;
      margin-bottom: 12px;
    }

    .sidebar-header h1 {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-secondary);
      letter-spacing: -0.08px;
    }

    .sidebar-header .badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      background: rgba(229, 229, 229, 0.06);
      padding: 2px 6px;
      border-radius: 4px;
      margin-top: 4px;
      display: inline-block;
    }

    .sidebar-section-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      padding: 12px 8px 6px 8px;
    }

    .site-item {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 32px;
      padding: 0 8px;
      border-radius: 6px;
      color: var(--text-secondary);
      text-decoration: none;
      cursor: pointer;
      border: none;
      background: none;
      font: inherit;
      width: 100%;
      text-align: left;
      transition: background 0.1s;
    }

    .site-item:hover {
      background: rgba(229, 229, 229, 0.06);
      color: var(--text-primary);
    }

    .site-item.active {
      background: rgba(229, 229, 229, 0.06);
      color: var(--text-primary);
    }

    .site-item .site-icon {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      background: var(--bg-surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
      overflow: hidden;
    }

    .site-item .site-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .site-item .site-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }

    .site-item .page-count {
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 12px 8px 0;
      border-top: 0.5px solid var(--border-default);
    }

    .sidebar-footer .server-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .server-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--brand-accent);
      flex-shrink: 0;
    }

    /* ─── Main content ───────────────────── */

    .main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: 48px;
      border-bottom: 0.5px solid var(--border-default);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 12px;
      flex-shrink: 0;
    }

    .topbar-title {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-primary);
    }

    .topbar-sep {
      color: var(--text-faint);
    }

    .topbar-page {
      font-size: 13px;
      color: var(--text-muted);
    }

    .topbar-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* ─── Buttons ─────────────────────────── */

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 28px;
      padding: 0 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: -0.08px;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .btn:hover { opacity: 0.85; }
    .btn:active { opacity: 0.7; }

    .btn-primary {
      background: var(--bg-primary-button);
      color: var(--text-on-primary);
    }

    .btn-secondary {
      background: none;
      border: 0.5px solid var(--border-subtle);
      color: var(--text-primary);
    }

    .btn-accent {
      background: var(--brand-accent-soft);
      color: var(--brand-accent);
      border: none;
    }

    .btn-ghost {
      background: none;
      border: none;
      color: var(--text-secondary);
      padding: 0 6px;
    }

    .btn-icon {
      width: 28px;
      height: 28px;
      padding: 0;
    }

    /* ─── Welcome / empty state ──────────── */

    .welcome {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .welcome-inner {
      text-align: center;
      max-width: 400px;
    }

    .welcome-inner h2 {
      font-size: 17px;
      font-weight: 400;
      line-height: 21px;
      letter-spacing: -0.44px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .welcome-inner p {
      font-size: 13px;
      line-height: 18px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .welcome-inner code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      background: var(--bg-card);
      border: 0.5px solid var(--border-default);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--text-secondary);
    }

    /* ─── Site detail ────────────────────── */

    .site-detail {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .site-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .site-header-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: var(--bg-card);
      border: 0.5px solid var(--border-default);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .site-header-info h2 {
      font-size: 17px;
      font-weight: 400;
      line-height: 21px;
      letter-spacing: -0.44px;
      color: var(--text-primary);
    }

    .site-header-info .meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ─── Tabs ────────────────────────────── */

    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 0.5px solid var(--border-default);
      margin-bottom: 20px;
    }

    .tab {
      padding: 8px 16px;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
      border-bottom: 2px solid transparent;
      transition: color 0.15s;
    }

    .tab:hover { color: var(--text-secondary); }

    .tab.active {
      color: var(--text-primary);
      border-bottom-color: var(--text-primary);
    }

    /* ─── Pages grid ─────────────────────── */

    .pages-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }

    .page-card {
      background: var(--bg-card);
      border: 0.5px solid var(--border-default);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .page-card:hover {
      border-color: var(--border-subtle);
    }

    .page-card-preview {
      width: 100%;
      height: 160px;
      background: var(--bg-surface);
      position: relative;
      overflow: hidden;
    }

    .page-card-preview iframe {
      width: 1440px;
      height: 900px;
      border: none;
      transform-origin: top left;
      transform: scale(0.194);
      pointer-events: none;
    }

    .page-card-info {
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .page-card-name {
      font-size: 13px;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .page-card-size {
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
      margin-left: 8px;
    }

    /* ─── Design.md viewer ───────────────── */

    .design-md-panel {
      display: none;
    }

    .design-md-panel.show {
      display: block;
    }

    .design-md-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .design-md-toolbar .status-text {
      font-size: 11px;
      color: var(--text-muted);
      margin-left: auto;
    }

    .design-md-content {
      background: var(--bg-card);
      border: 0.5px solid var(--border-default);
      border-radius: 12px;
      padding: 24px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      line-height: 18px;
      color: var(--text-secondary);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: calc(100vh - 220px);
      overflow-y: auto;
    }

    .design-md-content::-webkit-scrollbar { width: 6px; }
    .design-md-content::-webkit-scrollbar-track { background: transparent; }
    .design-md-content::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }

    .design-md-empty {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }

    .design-md-empty p {
      margin-bottom: 12px;
    }

    /* ─── Page preview (full) ────────────── */

    .page-preview-panel {
      display: none;
    }

    .page-preview-panel.show {
      display: block;
    }

    .page-preview-frame {
      width: 100%;
      height: calc(100vh - 220px);
      border: 0.5px solid var(--border-default);
      border-radius: 12px;
      overflow: hidden;
    }

    .page-preview-frame iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }

    /* ─── Toast ───────────────────────────── */

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--bg-card);
      border: 0.5px solid var(--border-subtle);
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      color: var(--text-primary);
      box-shadow: rgba(0, 0, 0, 0.24) 0px 2px 8px;
      transform: translateY(100px);
      opacity: 0;
      transition: transform 0.2s, opacity 0.2s;
      z-index: 100;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.success { border-left: 3px solid var(--brand-accent); }
    .toast.error { border-left: 3px solid var(--red-error); }

    /* ─── Scrollbar ──────────────────────── */

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }

    /* ─── Rendered MD (rich) ──────────────── */

    .md-rendered {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 13px;
      line-height: 20px;
      color: var(--text-secondary);
    }

    .md-rendered h1 {
      font-size: 20px;
      font-weight: 400;
      line-height: 28px;
      color: var(--text-primary);
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 0.5px solid var(--border-default);
    }

    .md-rendered h2 {
      font-size: 15px;
      font-weight: 500;
      line-height: 22px;
      color: var(--text-primary);
      margin-top: 24px;
      margin-bottom: 8px;
    }

    .md-rendered h3 {
      font-size: 13px;
      font-weight: 500;
      line-height: 18px;
      color: var(--text-primary);
      margin-top: 16px;
      margin-bottom: 6px;
    }

    .md-rendered p { margin-bottom: 8px; }

    .md-rendered blockquote {
      border-left: 3px solid var(--border-subtle);
      padding-left: 12px;
      color: var(--text-muted);
      margin-bottom: 12px;
      font-size: 12px;
    }

    .md-rendered code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      background: rgba(229, 229, 229, 0.06);
      padding: 1px 5px;
      border-radius: 4px;
      color: var(--text-primary);
    }

    .md-rendered pre {
      background: rgb(16, 16, 16);
      border: 0.5px solid var(--border-default);
      border-radius: 8px;
      padding: 12px 16px;
      overflow-x: auto;
      margin-bottom: 12px;
    }

    .md-rendered pre code {
      background: none;
      padding: 0;
      font-size: 12px;
      line-height: 18px;
      color: var(--text-secondary);
    }

    .md-rendered table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 12px;
      font-size: 12px;
    }

    .md-rendered th {
      text-align: left;
      padding: 6px 10px;
      border-bottom: 0.5px solid var(--border-subtle);
      color: var(--text-muted);
      font-weight: 600;
      font-size: 11px;
    }

    .md-rendered td {
      padding: 6px 10px;
      border-bottom: 0.5px solid var(--border-default);
      color: var(--text-secondary);
    }

    .md-rendered ul, .md-rendered ol {
      padding-left: 20px;
      margin-bottom: 8px;
    }

    .md-rendered li { margin-bottom: 4px; }

    .md-rendered strong { color: var(--text-primary); }

    .md-rendered hr {
      border: none;
      border-top: 0.5px solid var(--border-default);
      margin: 16px 0;
    }
  </style>
</head>
<body>
  <div class="shell">
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>Design System Clone</h1>
        <span class="badge">Dashboard</span>
      </div>
      <div class="sidebar-section-label">Sites</div>
      <div id="siteList"></div>
      <div class="sidebar-footer">
        <div class="server-status">
          <span class="server-dot" id="serverDot"></span>
          <span id="serverStatus">Running on :3847</span>
        </div>
      </div>
    </nav>

    <!-- Main -->
    <main class="main" id="main">
      <!-- Welcome state -->
      <div class="welcome" id="welcomeView">
        <div class="welcome-inner">
          <h2>Design System Manager</h2>
          <p>
            Capture any website's design system with the Chrome extension.
            View, manage, and copy <code>design.md</code> files from here.
          </p>
          <p>Select a site from the sidebar to get started.</p>
        </div>
      </div>

      <!-- Site detail view -->
      <div id="siteView" style="display:none; flex:1; display:none; flex-direction:column;">
        <div class="topbar" id="topbar">
          <span class="topbar-title" id="topbarTitle"></span>
          <span class="topbar-sep">/</span>
          <span class="topbar-page" id="topbarPage">Overview</span>
          <div class="topbar-actions" id="topbarActions"></div>
        </div>
        <div class="site-detail" id="siteContent"></div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="./app.js"></script>
</body>
</html>
